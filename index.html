<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Advisory Agent</title>
    <style>
        body { background-color: #0b0f19; color: #f0f3f5; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #111827; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #1f2937; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; background: #1f2937; color: white; border: 1px solid #374151; border-radius: 6px; box-sizing: border-box; }
        button { background: #3b82f6; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #2563eb; }
        .advisory-box { background: #1e1b4b; border-left: 4px solid #818cf8; padding: 15px; border-radius: 6px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>☁️ Weather Advisory Agent</h2>
        <div class="card">
            <h3>👤 Personal Context</h3>
            <label>City:</label><input type="text" id="city" value="chennai">
            <label>Health Condition:</label><input type="text" id="health" value="asthma">
            <label>Commute Mode:</label>
            <select id="commute">
                <option value="Bicycle">Bicycle</option>
                <option value="Car">Car / Bike</option>
                <option value="Walking">Walking</option>
            </select>
            <button onclick="getWeatherAdvice()">Update Context</button>
        </div>
        <div class="card">
            <h3>🍊 Advisory Engine</h3>
            <div class="advisory-box">
                <p><strong>Status:</strong> <span id="status">Waiting for input...</span></p>
                <p id="advice">Fill the details and click Update.</p>
            </div>
        </div>
    </div>

    <script>
        async function getWeatherAdvice() {
            const city = document.getElementById('city').value;
            const health = document.getElementById('health').value;
            const commute = document.getElementById('commute').value;

            document.getElementById('status').innerText = "Connecting...";
            document.getElementById('advice').innerText = "Sending data to backend server...";

            try {
                // Unga exact Render URL-ah inga fix பண்ணியாச்சு!
                const response = await fetch('https://weather-agent-og33.onrender.com/advise', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ city: city, health_conditions: health, commute_mode: commute })
                });

                if (!response.ok) {
                    throw new Error(`Server returned status ${response.status}`);
                }

                const data = await response.json();
                
                document.getElementById('status').innerText = data.status || "SUCCESS";
                document.getElementById('advice').innerText = data.advice || "No advice returned from server.";
                
            } catch (err) {
                document.getElementById('status').innerText = "CONNECTION ERROR";
                document.getElementById('advice').innerText = "Error details: " + err.message + ". (If using Render Free Tier, the first request can take up to 1 minute to wake up the server).";
            }
        }
    </script>
</body>
</html>
